version: '3.8'

services:
  api:
    build: ./backend
    container_name: estoque_api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Optional: Frontend service
  frontend:
    build: ./frontend
    container_name: estoque_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://api:8000
